services:
  training-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      # target: production # Actívalo cuando tu Dockerfile sea multi-stage
    image: ${BACKEND_IMAGE:-fitpilot-training-backend:local}
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DEPLOY_ENV: production
      REDIS_URL: redis://redis:6379/0
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      coolify:
        aliases:
          - training-backend
      default:
        aliases:
          - training-backend

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    # ✅ AÑADIDO: Para asegurar comunicación privada con el backend
    networks:
      - default
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  redis_data:
    name: ${REDIS_VOLUME_NAME:-fitpilot-redis-data}

networks:
  coolify:
    external: true
  default:
    driver: bridge