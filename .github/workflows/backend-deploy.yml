name: Backend Deploy

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:

concurrency:
  group: backend-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.ref_name == 'development'
    permissions:
      contents: read
      packages: write
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deploy metadata
        id: meta
        run: |
          GHCR_OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            DEPLOY_ENV="production"
          else
            DEPLOY_ENV="development"
          fi

          echo "ghcr_owner=$GHCR_OWNER" >> "$GITHUB_OUTPUT"
          echo "deploy_env=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "image_name=ghcr.io/$GHCR_OWNER/fitpilot-training-backend" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "channel_tag=$DEPLOY_ENV-latest" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.meta.outputs.ghcr_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.channel_tag }}
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref_name == 'main' || github.ref_name == 'development')
    permissions:
      contents: read
      packages: read
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deploy metadata
        id: meta
        run: |
          GHCR_OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            DEPLOY_ENV="production"
            APP_DIR="${{ vars.VPS_BACKEND_PATH || '/opt/Fitpilot_training_backend' }}"
            ENV_FILE="${{ vars.VPS_BACKEND_ENV_FILE || '.env' }}"
          else
            DEPLOY_ENV="development"
            APP_DIR="${{ vars.VPS_BACKEND_PATH_DEV || vars.VPS_BACKEND_PATH || '/opt/development/Fitpilot_training_backend' }}"
            ENV_FILE="${{ vars.VPS_BACKEND_ENV_FILE_DEV || vars.VPS_BACKEND_ENV_FILE || '.env' }}"
          fi

          echo "ghcr_owner=$GHCR_OWNER" >> "$GITHUB_OUTPUT"
          echo "deploy_env=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "image_name=ghcr.io/$GHCR_OWNER/fitpilot-training-backend" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "container_name=fitpilot-backend-$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "project_name=fitpilot-backend-$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "redis_volume=fitpilot-redis-data-$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "app_dir=$APP_DIR" >> "$GITHUB_OUTPUT"
          echo "env_file=$ENV_FILE" >> "$GITHUB_OUTPUT"
          echo "remote_compose_file=docker-compose.release.yml" >> "$GITHUB_OUTPUT"

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Add VPS host to known_hosts
        run: |
          PORT="${{ secrets.VPS_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync release compose to VPS
        env:
          APP_DIR: ${{ steps.meta.outputs.app_dir }}
          REMOTE_COMPOSE_FILE: ${{ steps.meta.outputs.remote_compose_file }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          PORT="${{ secrets.VPS_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi

          TMP_COMPOSE_BASENAME="fitpilot-training-docker-compose.release.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}.yml"

          sshpass -p "$VPS_PASSWORD" scp -P "$PORT" -o StrictHostKeyChecking=yes \
            docker-compose.release.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$TMP_COMPOSE_BASENAME

          sshpass -p "$VPS_PASSWORD" ssh -p "$PORT" -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << EOF
          set -euo pipefail
          TMP_COMPOSE="\$HOME/$TMP_COMPOSE_BASENAME"
          if ! mkdir -p "$APP_DIR" 2>/dev/null; then
            echo "$VPS_PASSWORD" | sudo -S mkdir -p "$APP_DIR"
          fi
          if mv "$TMP_COMPOSE" "$APP_DIR/$REMOTE_COMPOSE_FILE" 2>/dev/null; then
            echo "release compose synced to $APP_DIR/$REMOTE_COMPOSE_FILE (without sudo)"
          else
            echo "$VPS_PASSWORD" | sudo -S mv "$TMP_COMPOSE" "$APP_DIR/$REMOTE_COMPOSE_FILE"
            echo "release compose synced to $APP_DIR/$REMOTE_COMPOSE_FILE (with sudo)"
          fi
          rm -f "$TMP_COMPOSE" 2>/dev/null || true
          EOF

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.2
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ steps.meta.outputs.ghcr_owner }}
          BACKEND_IMAGE: ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
          CONTAINER_NAME: ${{ steps.meta.outputs.container_name }}
          PROJECT_NAME: ${{ steps.meta.outputs.project_name }}
          REDIS_VOLUME: ${{ steps.meta.outputs.redis_volume }}
          APP_DIR: ${{ steps.meta.outputs.app_dir }}
          ENV_FILE: ${{ steps.meta.outputs.env_file }}
          DEPLOY_ENV: ${{ steps.meta.outputs.deploy_env }}
          REMOTE_COMPOSE_FILE: ${{ steps.meta.outputs.remote_compose_file }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: GHCR_TOKEN,GHCR_USER,BACKEND_IMAGE,CONTAINER_NAME,PROJECT_NAME,REDIS_VOLUME,APP_DIR,ENV_FILE,DEPLOY_ENV,REMOTE_COMPOSE_FILE
          script: |
            set -euo pipefail
            cd "$APP_DIR"

            [ -n "$GHCR_TOKEN" ] || (echo "GHCR_TOKEN is empty" && exit 1)
            [ -n "$GHCR_USER" ] || (echo "GHCR_USER is empty" && exit 1)
            [ -n "$BACKEND_IMAGE" ] || (echo "BACKEND_IMAGE is empty" && exit 1)
            [ -n "$CONTAINER_NAME" ] || (echo "CONTAINER_NAME is empty" && exit 1)
            [ -n "$PROJECT_NAME" ] || (echo "PROJECT_NAME is empty" && exit 1)
            [ -n "$REDIS_VOLUME" ] || (echo "REDIS_VOLUME is empty" && exit 1)
            [ -n "$DEPLOY_ENV" ] || (echo "DEPLOY_ENV is empty" && exit 1)
            [ -f "$REMOTE_COMPOSE_FILE" ] || (echo "Missing compose file: $REMOTE_COMPOSE_FILE" && exit 1)

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            docker network create fitpilot-shared >/dev/null 2>&1 || true
            docker volume create "$REDIS_VOLUME" >/dev/null

            BACKEND_IMAGE="$BACKEND_IMAGE" \
            APP_ENV_FILE="$ENV_FILE" \
            CONTAINER_NAME="$CONTAINER_NAME" \
            DEPLOY_ENV="$DEPLOY_ENV" \
            REDIS_VOLUME_NAME="$REDIS_VOLUME" \
            docker compose -f "$REMOTE_COMPOSE_FILE" -p "$PROJECT_NAME" --env-file "$ENV_FILE" pull backend

            BACKEND_IMAGE="$BACKEND_IMAGE" \
            APP_ENV_FILE="$ENV_FILE" \
            CONTAINER_NAME="$CONTAINER_NAME" \
            DEPLOY_ENV="$DEPLOY_ENV" \
            REDIS_VOLUME_NAME="$REDIS_VOLUME" \
            docker compose -f "$REMOTE_COMPOSE_FILE" -p "$PROJECT_NAME" --env-file "$ENV_FILE" up -d redis

            BACKEND_IMAGE="$BACKEND_IMAGE" \
            APP_ENV_FILE="$ENV_FILE" \
            CONTAINER_NAME="$CONTAINER_NAME" \
            DEPLOY_ENV="$DEPLOY_ENV" \
            REDIS_VOLUME_NAME="$REDIS_VOLUME" \
            docker compose -f "$REMOTE_COMPOSE_FILE" -p "$PROJECT_NAME" --env-file "$ENV_FILE" up -d --force-recreate backend

            ACTUAL_IMAGE="$(docker inspect "$CONTAINER_NAME" --format '{{.Config.Image}}')"
            if [ "$ACTUAL_IMAGE" != "$BACKEND_IMAGE" ]; then
              echo "Unexpected backend image: $ACTUAL_IMAGE"
              exit 1
            fi

            for attempt in $(seq 1 30); do
              if [ "$attempt" -eq 30 ]; then
                docker logs --tail 100 "$CONTAINER_NAME" || true
                echo "Training backend did not become healthy in time"
                exit 1
              fi
              if [ "$(docker inspect "$CONTAINER_NAME" --format '{{.State.Running}}')" = "true" ] && curl -fsS "http://127.0.0.1:8000/health" >/dev/null; then
                break
              fi
              sleep 3
            done

            docker image prune -f

            BACKEND_IMAGE="$BACKEND_IMAGE" \
            APP_ENV_FILE="$ENV_FILE" \
            CONTAINER_NAME="$CONTAINER_NAME" \
            DEPLOY_ENV="$DEPLOY_ENV" \
            REDIS_VOLUME_NAME="$REDIS_VOLUME" \
            docker compose -f "$REMOTE_COMPOSE_FILE" -p "$PROJECT_NAME" --env-file "$ENV_FILE" ps

            docker logout ghcr.io || true
