name: Frontend CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - development
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  VITE_NUTRITION_API_URL: ${{ vars.VITE_NUTRITION_API_URL || 'https://nutrition-api.fitpilot.fit' }}
  VITE_TRAINING_API_URL: ${{ vars.VITE_TRAINING_API_URL || 'http://localhost:3000' }}

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fitpilot-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_NUTRITION_API_URL=${{ env.VITE_NUTRITION_API_URL }}
            VITE_TRAINING_API_URL=${{ env.VITE_TRAINING_API_URL }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development')
    permissions:
      contents: read
      packages: read

    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Add VPS host to known_hosts
        run: |
          PORT="${{ secrets.VPS_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS (password SSH)
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
          APP_DIR: ${{ vars.VPS_FRONTEND_PATH || '/opt/fitpilot-frontend' }}
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            FRONTEND_PORT="4000"
            FRONTEND_CONTAINER_NAME="fitpilot-frontend-prod"
            PROJECT_NAME="fitpilot-frontend-prod"
          else
            FRONTEND_PORT="6000"
            FRONTEND_CONTAINER_NAME="fitpilot-frontend-dev"
            PROJECT_NAME="fitpilot-frontend-dev"
          fi

          PORT="${{ secrets.VPS_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi

          sshpass -p "$VPS_PASSWORD" ssh -p "$PORT" -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << EOF
          set -e
          cd "$APP_DIR"

          export FRONTEND_PORT="$FRONTEND_PORT"
          export FRONTEND_CONTAINER_NAME="$FRONTEND_CONTAINER_NAME"

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          docker compose -p "$PROJECT_NAME" pull
          docker compose -p "$PROJECT_NAME" up -d
          docker image prune -f
          docker compose -p "$PROJECT_NAME" ps
          EOF
