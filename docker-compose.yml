services:
  frontend:
    container_name: ${FRONTEND_CONTAINER_NAME:-fitpilot-frontend}
    image: fitpilot-frontend:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_NUTRITION_API_URL: ${VITE_NUTRITION_API_URL:-https://nutrition-api.fitpilot.fit}
        VITE_TRAINING_API_URL: ${VITE_TRAINING_API_URL:-http://localhost:8010}
    ports:
      - "${FRONTEND_PORT:-4000}:80"
    restart: unless-stopped
